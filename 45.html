Transform.html

<html>

<head>
    <title></title>
    <style>
        div {
            height: 150px;
            width: 150px;
            background-color: steelblue;
            margin: 20px;
            text-align: center;
            line-height: 150px;
            font-size: 18px;
            transition: 0.1s;

        }

        .translate:hover {
            transform: translate(100px, 50px);
        }

        .rotate:hover {
            transform: rotate(45deg);
        }

        .scalex:hover {
            transform: scalex(1.5);
        }

        .scaley:hover {
            transform: scaley(1.5);
        }

        .scale:hover {
            transform: scale(1.3);
        }

        .skewx:hover {
            transform: skewx(20deg);
        }

        .skewy:hover {
            transform: skewy(20deg);
        }

        .skew:hover {
            transform: skew(20deg, 10deg);
        }

        .matrix:hover {
            transform: matrix(1, 0.2, 0.2, 1, 40, 20);
        }
    </style>
</head>

<body>
    <div class="translate">Translate</div>
    <div class="rotate">Rotate</div>
    <div class="scalex">Scale X</div>
    <div class="scaley">Scale Y</div>
    <div class="scale">Scale</div>
    <div class="skewx">Skew X</div>
    <div class="skewy">Skew Y</div>
    <div class="skew">Skew</div>
    <div class="matrix">Matrix</div>


</body>

</html>
