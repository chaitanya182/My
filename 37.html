<!DOCTYPE html>
<html>

<head>
    <title>Grid Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            max-width: 600px;
        }

        .box {
            padding: 20px;
            color: white;
            text-align: center;
            border-radius: 8px;
        }

        .box1 {
            background-color: tomato;
        }

        .box2 {
            background-color: steelblue;
        }
    </style>
</head>

<body>
    <h2>Two Columns Grid</h2>
    <div class="container">
        <div class="box box1">Column 1</div>
        <div class="box box2">Column 2</div>
    </div>
</body>

</html>
