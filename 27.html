<html>

<head>
    <title>Text Properties</title>
    <style>
        h1 {
            color: darkblue;
            text-align: center;
            text-decoration: underline;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 5px gray;
        }

        p {
            text-align: center;
            line-height: 30px;
            word-spacing: 8px;
        }
    </style>
</head>

<body>
    <h1>CSS Text Property</h1>
    <p>CSS Provides various properties to control the appearance of text.</p>
</body>

</html>
