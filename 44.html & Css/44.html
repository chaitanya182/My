<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        /* Navigation bar styling */
        ul {
            list-style-type: none;
            background-color: lightblue;
            overflow: hidden;
            margin: 0;
            padding: 0;
            display: flex;
            /* Aligns items perfectly */
            align-items: center;
            /* Vertically centers the items */
        }

        li {
            float: left;
        }

        li a {
            display: block;
            text-decoration: none;
            padding: 20px 25px;
            /* Increased padding for better spacing */
            font-family: cursive;
            font-weight: bold;
            font-style: italic;
            color: black;
            font-size: 20px;
            /* Increased text size here */
        }

        li a:hover {
            background-color: pink;
            color: red;
        }

        .logo-container {
            padding: 10px 20px;
        }

        .logo-container img {
            height: 50px;
            /* Increased logo size */
            width: 50px;
            display: block;
        }
    </style>
</head>

<body>

    <ul>
        <li class="logo-container"><img src="Image.png" alt="Logo"></li>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Help</a></li>
        <li><a href="#">Services</a></li>
    </ul>

</body>

</html>
